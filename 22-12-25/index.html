<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Landing Page</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header / Navbar -->
    <header class="header">
        <div class="container nav">
            <h1 class="logo">MySite</h1>
            <nav>
                <a href="#">Home</a>
                <a href="#">Features</a>
                <a href="#">Contact</a>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container hero-content">
            <h2>Welcome to Our Landing Page</h2>
            <p>Build modern and responsive layouts using Flexbox and Grid.</p>
            <div class="buttons">
                <button class="btn primary">Get Started</button>
                <button class="btn secondary">Learn More</button>
            </div>
        </div>
    </section>

    <!-- Features Section -->
    <section class="features">
        <div class="container features-grid">

            <div class="card">
                <h3>Fast</h3>
                <p>Optimized and lightweight design.</p>
            </div>

            <div class="card">
                <h3>Responsive</h3>
                <p>Works on mobile, tablet, and desktop.</p>
            </div>

            <div class="card">
                <h3>Modern</h3>
                <p>Uses Flexbox and CSS Grid.</p>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2025 Landing Page</p>
    </footer>

</body>

</html>
