            height="300">

<footer>
    <script>
        function show_hidefun() {
            if (document.getElementById('myImageId').style.visibility == "hidden")
                document.getElementById('myImageId').style.visibility = 'visible';
            else
                document.getElementById('myImageId').style.visibility = "hidden";
        }

    </script>
</footer>
